# Serves the compiled SPA. The outer reverse proxy handles TLS and /api.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location ~* \.(js|css|svg|woff2?|png|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
