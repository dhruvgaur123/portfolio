# Development stack: hot-reloading Angular dev server + Spring Boot devtools
services:
  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    command: mvn spring-boot:run
    volumes: ["./backend:/app", "m2:/root/.m2"]
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports: ["8080:8080"]

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm start -- --host 0.0.0.0"
    volumes: ["./frontend:/app"]
    ports: ["4200:4200"]

volumes:
  m2:
