spring:
  application:
    name: portfolio-api
  # PostgreSQL later: add spring.datasource.* here and the JPA starter in pom.xml.

app:
  resend:
    api-key: ${RESEND_API_KEY:}
    # onboarding@resend.dev works without domain verification; sending is
    # then restricted to the email address of the Resend account owner,
    # which matches app.contact.recipient below.
    from: ${RESEND_FROM:onboarding@resend.dev}
  contact:
    recipient: ${CONTACT_RECIPIENT:owner@example.com}
    rate-limit:
      max-requests: 3          # per window per IP
      window-minutes: 15
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

springdoc:
  swagger-ui:
    path: /api/docs

logging:
  level:
    dev.dhruvgaur: INFO